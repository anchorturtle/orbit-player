<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Orbit — jestR</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  :root {
    --grain-opacity: 0.09;
    --scanline-opacity: 0.04;
    --vignette-strength: 0.65;
    --aberration: 1.5px;
    --jestr-blue:   #2D5BFF;
    --jestr-green:  #00C896;
    --jestr-purple: #7B2FFF;
    --jestr-red:    #E8003D;
  }
  * { box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0e0c0b; margin: 0; overflow: hidden; color: #e9e1de; }
  .grain-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 200; opacity: var(--grain-opacity);
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    animation: grain-shift 0.08s steps(1) infinite; mix-blend-mode: overlay;
  }
  @keyframes grain-shift {
    0%{transform:translate(0,0)} 20%{transform:translate(-2px,1px)} 40%{transform:translate(2px,-1px)}
    60%{transform:translate(-1px,2px)} 80%{transform:translate(1px,-2px)} 100%{transform:translate(0,0)}
  }
  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 199;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,var(--scanline-opacity)) 2px, rgba(0,0,0,var(--scanline-opacity)) 4px);
  }
  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 198;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(6,4,3,var(--vignette-strength)) 100%);
  }
  .chroma { position: relative; display: inline-block; }
  .chroma::before, .chroma::after { content: attr(data-text); position: absolute; inset: 0; pointer-events: none; }
  .chroma::before { color: rgba(232,0,61,0.4); transform: translateX(calc(-1 * var(--aberration))); mix-blend-mode: screen; }
  .chroma::after  { color: rgba(45,91,255,0.4); transform: translateX(var(--aberration)); mix-blend-mode: screen; }
  .planet-glow {
    filter: blur(55px);
    background: radial-gradient(circle, var(--jestr-purple) 0%, var(--jestr-blue) 60%, var(--jestr-green) 100%);
    animation: pulse 9s infinite alternate; opacity: 0.65;
  }
  @keyframes pulse { 0%{transform:scale(1);opacity:.55} 100%{transform:scale(1.08);opacity:.75} }
  .depth-far  { filter: blur(3px) saturate(0.5) brightness(0.7); }
  .depth-mid  { filter: blur(0.6px) saturate(0.9); }
  .depth-near { filter: none; }
  body::before {
    content:""; position:fixed; inset:0; pointer-events:none; z-index:1;
    background: radial-gradient(ellipse at 30% 60%, rgba(45,91,255,0.05) 0%, transparent 60%);
  }
  .container-texture { position: relative; }
  .container-texture::after {
    content:""; position:absolute; inset:0; pointer-events:none; opacity:0.05; border-radius:inherit;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n2'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n2)'/%3E%3C/svg%3E");
  }
  @keyframes vhs-flicker { 0%,96%,100%{opacity:1} 97%{opacity:.9} 98%{opacity:1} 99%{opacity:.94} }
  .vhs-flicker { animation: vhs-flicker 6s infinite; }
  .tape-counter {
    font-variant-numeric: tabular-nums; letter-spacing: 0.15em;
    font-size: 9px; color: rgba(0,200,150,0.55); font-weight: 700; text-transform: uppercase;
  }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .track-item.active { background: rgba(45,91,255,0.1) !important; border-color: rgba(123,47,255,0.3) !important; }
  .track-item.active .track-title  { color: #e9e1de !important; }
  .track-item.active .track-artist { color: var(--jestr-green) !important; }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    position: relative; height: 20px;
    display: flex; align-items: center;
    cursor: pointer; flex: 1;
  }
  .progress-track-bg {
    position: absolute; left: 0; right: 0; height: 4px; border-radius: 4px;
    background: repeating-linear-gradient(90deg,rgba(255,255,255,0.04) 0px,rgba(255,255,255,0.04) 2px,transparent 2px,transparent 6px), rgba(30,27,24,1);
    transition: height 0.12s;
  }
  .progress-fill-bar {
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    height: 4px; border-radius: 4px;
    background: linear-gradient(90deg, var(--jestr-purple), var(--jestr-blue), var(--jestr-green));
    pointer-events: none; transition: height 0.12s;
  }
  .progress-thumb {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 14px; height: 14px; border-radius: 50%; background: #fff;
    box-shadow: 0 0 0 3px rgba(123,47,255,0.5), 0 2px 8px rgba(0,0,0,0.6);
    pointer-events: none; opacity: 0;
    transition: opacity 0.15s, transform 0.1s; z-index: 2;
  }
  .progress-wrap:hover .progress-thumb { opacity: 1; }
  .progress-wrap:hover .progress-track-bg { height: 5px; }
  .progress-wrap:hover .progress-fill-bar { height: 5px; }
  .progress-wrap.dragging .progress-thumb { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }

  /* ── VOLUME ── */
  .volume-wrap { position: relative; height: 16px; display: flex; align-items: center; cursor: pointer; width: 72px; }
  .volume-track-bg { position: absolute; left:0; right:0; height:3px; border-radius:3px; background: rgba(30,27,24,1); }
  .volume-fill-bar { position: absolute; left:0; top:50%; transform:translateY(-50%); height:3px; border-radius:3px; background: var(--jestr-green); pointer-events:none; }
  .volume-thumb { position:absolute; top:50%; transform:translate(-50%,-50%); width:10px; height:10px; border-radius:50%; background:#fff; box-shadow:0 0 0 2px rgba(0,200,150,0.4); pointer-events:none; opacity:0; transition:opacity 0.15s; }
  .volume-wrap:hover .volume-thumb { opacity:1; }

  /* ── SEARCH BAR ── */
  .search-wrap {
    display: flex; align-items: center; gap: 8px;
    background: rgba(22,19,16,0.9);
    border: 1px solid rgba(123,47,255,0.2);
    border-radius: 10px; padding: 0 10px; height: 36px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-wrap:focus-within { border-color: rgba(123,47,255,0.55); box-shadow: 0 0 0 3px rgba(123,47,255,0.08); }
  .search-wrap .material-symbols-outlined { font-size: 16px; color: rgba(110,104,117,0.6); flex-shrink:0; }
  .search-wrap input {
    background: transparent !important; border: none !important; outline: none !important;
    box-shadow: none !important; -webkit-appearance: none !important; appearance: none !important;
    color: #e9e1de; font-size: 12px; font-family: inherit; width: 100%; letter-spacing: 0.02em; padding: 0;
  }
  .search-wrap input::placeholder { color: rgba(110,104,117,0.45); }
  .search-wrap input:focus { outline: none !important; box-shadow: none !important; }

  /* ── PLAY BUTTON ── */
  .play-btn {
    background: linear-gradient(135deg, var(--jestr-purple), var(--jestr-blue));
    box-shadow: 0 0 22px rgba(123,47,255,0.45); transition: box-shadow 0.2s, transform 0.1s;
  }
  .play-btn:hover { box-shadow: 0 0 30px rgba(45,91,255,0.55); }

  /* ── RINGS ── */
  .ring-far  { animation: ring-expand 12s linear infinite; }
  .ring-near { animation: ring-expand  9s linear infinite 1.5s; }
  @keyframes ring-expand { 0%{transform:scale(0.4);opacity:.6} 80%{opacity:.1} 100%{transform:scale(1.6);opacity:0} }

  /* ── MOBILE DRAWER ── */
  #mobile-drawer { transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
  #mobile-drawer.open { transform: translateX(0); }
  #drawer-overlay { opacity:0; pointer-events:none; transition:opacity 0.3s; }
  #drawer-overlay.open { opacity:1; pointer-events:all; }

  /* ── CTRL BUTTON SHARED ── */
  .ctrl-btn { background:none; border:none; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center; transition: color 0.2s, transform 0.1s; }
  .ctrl-btn:hover { transform: scale(1.12); }
  .ctrl-btn:active { transform: scale(0.95); }
</style>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: { extend: {
      colors: {
        "surface": "#0e0c0b", "surface-container-low": "#181512",
        "surface-container": "#1e1b18", "surface-container-high": "#272320",
        "on-surface": "#e9e1de", "outline": "#6e6875", "background": "#0e0c0b",
      },
      fontFamily: { headline: ["Plus Jakarta Sans"], body: ["Plus Jakarta Sans"] },
      borderRadius: { DEFAULT: "0.75rem", lg: "1.5rem", xl: "2.5rem", full: "9999px" },
    }},
  }
</script>
</head>
<body>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="grain-overlay"></div>
<audio id="audio-player" preload="auto"></audio>

<!-- ══ SIDEBAR ══════════════════════════════════════════════ -->
<aside class="hidden md:flex h-full w-64 fixed left-0 top-0 z-40 flex-col border-r container-texture depth-near"
  style="background:rgba(14,12,11,0.99);border-color:rgba(45,91,255,0.1);padding:24px 20px;gap:16px">
  <div style="margin-bottom:4px">
    <h1 class="text-2xl font-black tracking-tighter italic vhs-flicker" style="color:var(--jestr-purple);line-height:1">Orbit</h1>
    <p class="font-bold tracking-[0.3em] text-[8px] uppercase" style="color:rgba(0,200,150,0.5);margin-top:2px">Cosmic Hi-Fi</p>
  </div>
  <button class="flex items-center gap-3 px-3 py-2 rounded-lg w-full text-left"
    style="background:rgba(123,47,255,0.12);color:rgba(200,180,255,0.9);font-weight:700;font-size:12px">
    <span class="material-symbols-outlined" style="font-size:18px">library_music</span>Tracks
  </button>
  <div style="height:1px;background:rgba(45,91,255,0.1)"></div>
  <div class="search-wrap">
    <span class="material-symbols-outlined">search</span>
    <input id="search-input" placeholder="Search tracks…" type="text" autocomplete="off"/>
  </div>
  <div class="flex items-center justify-between" style="padding:0 2px">
    <span class="tape-counter">Tracklist</span>
    <span class="tape-counter" id="track-count">12 TRK</span>
  </div>
  <div class="flex-1 overflow-y-auto no-scrollbar" style="display:flex;flex-direction:column;gap:2px" id="sidebar-tracklist"></div>
</aside>

<div id="drawer-overlay" class="fixed inset-0 bg-black/70 z-40 md:hidden"></div>

<!-- ══ MOBILE DRAWER ═════════════════════════════════════════ -->
<aside id="mobile-drawer" class="fixed left-0 top-0 h-full w-64 z-50 flex flex-col p-5 gap-4 md:hidden container-texture"
  style="background:rgba(14,12,11,0.99)">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-xl font-black tracking-tighter italic vhs-flicker" style="color:var(--jestr-purple)">Orbit</h1>
      <p class="text-[8px] font-bold tracking-[0.3em] uppercase" style="color:rgba(0,200,150,0.5)">Cosmic Hi-Fi</p>
    </div>
    <button id="close-drawer" style="color:#6e6875"><span class="material-symbols-outlined">close</span></button>
  </div>
  <div style="height:1px;background:rgba(45,91,255,0.1)"></div>
  <span class="tape-counter" style="padding:0 4px">Tracklist</span>
  <div class="flex-1 overflow-y-auto no-scrollbar" style="display:flex;flex-direction:column;gap:2px" id="mobile-tracklist"></div>
</aside>

<!-- ══ MOBILE TOP BAR ════════════════════════════════════════ -->
<header class="md:hidden fixed top-0 left-0 right-0 z-30 flex items-center justify-between px-5 py-3.5 border-b depth-near"
  style="background:rgba(14,12,11,0.93);backdrop-filter:blur(20px);border-color:rgba(45,91,255,0.08)">
  <button id="open-drawer" style="color:#6e6875"><span class="material-symbols-outlined">menu</span></button>
  <h1 class="text-lg font-black tracking-tighter italic vhs-flicker" style="color:var(--jestr-purple)">Orbit</h1>
  <div class="w-7"></div>
</header>

<!-- ══ DESKTOP MAIN ════════════════════════════════════════════ -->
<main class="hidden md:flex h-screen pb-[100px] items-center justify-center overflow-hidden relative"
  style="margin-left:16rem;padding-left:40px;padding-right:40px">
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none depth-far">
    <div class="absolute w-[640px] h-[640px] rounded-full ring-far" style="border:1px solid rgba(45,91,255,0.07)"></div>
    <div class="absolute w-[420px] h-[420px] rounded-full ring-near" style="border:1px solid rgba(123,47,255,0.09)"></div>
  </div>
  <div class="relative flex items-center justify-center" style="flex:1">
    <div class="relative w-[380px] h-[380px] depth-mid">
      <div class="planet-glow absolute inset-0 rounded-full"></div>
      <div class="absolute inset-0 rounded-full overflow-hidden shadow-2xl"
        style="background:rgba(22,19,14,0.3);backdrop-filter:blur(20px) saturate(1.3);border:1px solid rgba(123,47,255,0.12)">
        <div class="w-full h-full" style="background-image:radial-gradient(rgba(255,255,255,0.14) 1px,transparent 0);background-size:12px 12px;opacity:0.18"></div>
        <div class="absolute inset-0" style="background:repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(255,255,255,0.01) 18px,rgba(255,255,255,0.01) 19px)"></div>
      </div>
      <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-8 z-10 depth-near">
        <p class="tape-counter" style="margin-bottom:12px">NOW PLAYING</p>
        <h2 id="focal-title" data-text="—" class="chroma font-black italic tracking-tighter leading-none uppercase"
          style="font-size:3rem;color:#e9e1de;text-shadow:0 0 40px rgba(123,47,255,0.4);margin-bottom:12px">—</h2>
        <p id="focal-artist" class="font-bold tracking-[0.5em] uppercase" style="font-size:10px;color:var(--jestr-green)">Select a track</p>
      </div>
    </div>
  </div>
  <div class="flex flex-col z-20 depth-near" style="width:260px;gap:16px">
    <div class="flex items-center justify-between" style="padding-bottom:12px;border-bottom:1px solid rgba(45,91,255,0.1)">
      <span class="tape-counter">Up Next</span>
      <span class="material-symbols-outlined" style="font-size:14px;color:var(--jestr-blue)">auto_awesome</span>
    </div>
    <div id="upnext-list" style="display:flex;flex-direction:column;gap:6px"></div>
  </div>
</main>

<!-- ══ MOBILE MAIN ═════════════════════════════════════════════ -->
<main class="md:hidden flex flex-col h-screen pt-14 pb-40 overflow-y-auto no-scrollbar">
  <div class="flex flex-col items-center py-8 relative">
    <div class="absolute w-56 h-56 rounded-full ring-far depth-far" style="border:1px solid rgba(45,91,255,0.07)"></div>
    <div class="relative w-44 h-44 depth-mid">
      <div class="planet-glow absolute inset-0 rounded-full"></div>
      <div class="absolute inset-0 rounded-full overflow-hidden" style="background:rgba(22,19,14,0.3);backdrop-filter:blur(16px);border:1px solid rgba(123,47,255,0.1)">
        <div class="w-full h-full" style="background-image:radial-gradient(rgba(255,255,255,0.14) 1px,transparent 0);background-size:10px 10px;opacity:0.15"></div>
      </div>
      <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-4 z-10 depth-near">
        <p class="tape-counter" style="font-size:7px;margin-bottom:4px">NOW PLAYING</p>
        <h2 id="focal-title-mobile" data-text="—" class="chroma text-xl font-black italic tracking-tighter leading-none uppercase" style="color:#e9e1de;margin-bottom:4px">—</h2>
        <p id="focal-artist-mobile" class="font-bold tracking-widest uppercase" style="font-size:8px;color:var(--jestr-green)">Select a track</p>
      </div>
    </div>
  </div>
  <div style="padding:0 20px 16px">
    <span class="tape-counter" style="display:block;margin-bottom:12px">All Tracks</span>
    <div style="display:flex;flex-direction:column;gap:4px" id="mobile-main-tracklist"></div>
  </div>
</main>

<!-- ══ DESKTOP FOOTER ═══════════════════════════════════════════ -->
<footer class="hidden md:flex fixed bottom-0 left-0 w-full z-50 items-end justify-center depth-near"
  style="padding:0 32px 20px;pointer-events:none">
  <div class="w-full container-texture" style="max-width:calc(100% - 16rem);margin-left:16rem;
    background:rgba(14,12,11,0.92);backdrop-filter:blur(32px) saturate(1.1);
    border:1px solid rgba(45,91,255,0.1);border-radius:18px;
    box-shadow:0 24px 64px -16px rgba(0,0,0,0.85);
    padding:14px 28px;pointer-events:all;
    display:flex;align-items:center;gap:20px">

    <!-- Now playing -->
    <div style="display:flex;align-items:center;gap:14px;width:210px;flex-shrink:0">
      <div style="width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
        background:rgba(123,47,255,0.15);border:1px solid rgba(123,47,255,0.22)">
        <span class="material-symbols-outlined" style="font-size:22px;color:var(--jestr-purple);font-variation-settings:'FILL' 1">music_note</span>
      </div>
      <div style="min-width:0">
        <p id="footer-title" style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.04em;color:#e9e1de;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">No Track</p>
        <p id="footer-artist" style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.2em;color:var(--jestr-green);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">&mdash;</p>
      </div>
    </div>

    <!-- Center controls -->
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:10px">
      <!-- Button row: shuffle | prev | -10 | play | +10 | next | repeat -->
      <div style="display:flex;align-items:center;gap:16px">
        <button id="btn-shuffle" class="ctrl-btn" style="color:#6e6875" title="Shuffle">
          <span class="material-symbols-outlined" style="font-size:18px">shuffle</span>
        </button>
        <button id="btn-prev" class="ctrl-btn" style="color:var(--jestr-blue)" title="Previous">
          <span class="material-symbols-outlined" style="font-size:22px">skip_previous</span>
        </button>
        <button id="btn-back10" class="ctrl-btn" style="color:#a09aad" title="Back 10s">
          <span class="material-symbols-outlined" style="font-size:20px">replay_10</span>
        </button>
        <button id="btn-play" class="play-btn" style="width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <span id="play-icon" class="material-symbols-outlined text-white" style="font-size:24px;font-variation-settings:'FILL' 1">play_arrow</span>
        </button>
        <button id="btn-fwd10" class="ctrl-btn" style="color:#a09aad" title="Forward 10s">
          <span class="material-symbols-outlined" style="font-size:20px">forward_10</span>
        </button>
        <button id="btn-next" class="ctrl-btn" style="color:var(--jestr-blue)" title="Next">
          <span class="material-symbols-outlined" style="font-size:22px">skip_next</span>
        </button>
        <!-- repeat: 0=off 1=all 2=one -->
        <button id="btn-repeat" class="ctrl-btn" style="color:#6e6875" title="Repeat">
          <span id="repeat-icon" class="material-symbols-outlined" style="font-size:18px">repeat</span>
        </button>
      </div>
      <!-- Progress row -->
      <div style="width:100%;display:flex;align-items:center;gap:10px">
        <span id="time-current" class="tape-counter" style="width:32px">0:00</span>
        <div class="progress-wrap" id="progress-rail">
          <div class="progress-track-bg"></div>
          <div class="progress-fill-bar" id="progress-fill" style="width:0%"></div>
          <div class="progress-thumb" id="progress-thumb"></div>
        </div>
        <span id="time-total" class="tape-counter" style="width:32px;text-align:right">0:00</span>
      </div>
    </div>

    <!-- Volume + download -->
    <div style="display:flex;align-items:center;gap:12px;width:170px;justify-content:flex-end;flex-shrink:0">
      <span class="material-symbols-outlined" style="font-size:18px;color:#6e6875">volume_up</span>
      <div class="volume-wrap" id="volume-rail">
        <div class="volume-track-bg"></div>
        <div class="volume-fill-bar" id="volume-fill" style="width:80%"></div>
        <div class="volume-thumb" id="volume-thumb"></div>
      </div>
      <button id="btn-download" class="ctrl-btn" style="color:#6e6875">
        <span class="material-symbols-outlined" style="font-size:20px">download</span>
      </button>
    </div>
  </div>
</footer>

<!-- ══ MOBILE FOOTER ════════════════════════════════════════════ -->
<footer class="md:hidden fixed bottom-0 left-0 right-0 z-50 depth-near" style="padding:4px 12px 18px">
  <div class="container-texture" style="background:rgba(14,12,11,0.93);backdrop-filter:blur(28px);border:1px solid rgba(45,91,255,0.1);border-radius:18px;box-shadow:0 -12px 40px -8px rgba(0,0,0,0.7);padding:12px 14px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div style="width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(123,47,255,0.15);border:1px solid rgba(123,47,255,0.22)">
        <span class="material-symbols-outlined" style="font-size:18px;color:var(--jestr-purple);font-variation-settings:'FILL' 1">music_note</span>
      </div>
      <div style="flex:1;min-width:0">
        <p id="mob-footer-title" style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.04em;color:#e9e1de;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">No Track</p>
        <p id="mob-footer-artist" style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.2em;color:var(--jestr-green)">&mdash;</p>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <button id="mob-btn-back10" class="ctrl-btn" style="color:#a09aad"><span class="material-symbols-outlined" style="font-size:18px">replay_10</span></button>
        <button id="mob-btn-prev" class="ctrl-btn" style="color:var(--jestr-blue)"><span class="material-symbols-outlined" style="font-size:20px">skip_previous</span></button>
        <button id="mob-btn-play" class="play-btn" style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <span id="mob-play-icon" class="material-symbols-outlined text-white" style="font-size:20px;font-variation-settings:'FILL' 1">play_arrow</span>
        </button>
        <button id="mob-btn-next" class="ctrl-btn" style="color:var(--jestr-blue)"><span class="material-symbols-outlined" style="font-size:20px">skip_next</span></button>
        <button id="mob-btn-fwd10" class="ctrl-btn" style="color:#a09aad"><span class="material-symbols-outlined" style="font-size:18px">forward_10</span></button>
        <button id="mob-btn-download" class="ctrl-btn" style="color:#6e6875"><span class="material-symbols-outlined" style="font-size:18px">download</span></button>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="mob-time-current" class="tape-counter" style="width:28px">0:00</span>
      <div class="progress-wrap" id="mob-progress-rail" style="flex:1">
        <div class="progress-track-bg"></div>
        <div class="progress-fill-bar" id="mob-progress-fill" style="width:0%"></div>
        <div class="progress-thumb" id="mob-progress-thumb"></div>
      </div>
      <span id="mob-time-total" class="tape-counter" style="width:28px;text-align:right">0:00</span>
    </div>
  </div>
</footer>

<script>
  const TRACKS = [
    { title: "Geronimo",                  artist: "jestR", file: "11 - Geronimo- jestR - 2020.mp3" },
    { title: "Mile High",                 artist: "jestR", file: "3 - Mile High- jestR - 2020.mp3" },
    { title: "Follow The Flow",           artist: "jestR", file: "Mp3-FollowTheFlow.mp3" },
    { title: "Soul Seer",                 artist: "jestR", file: "Mp3-SoulSeer.mp3" },
    { title: "Peace",                     artist: "jestR", file: "Peace.mp3" },
    { title: "Strider",                   artist: "jestR", file: "Strider.mp3" },
    { title: "Insane Membrane",           artist: "jestR", file: "Insane_membrane.mp3" },
    { title: "News",                      artist: "jestR", file: "Newsss.mp3" },
    { title: "Wheels",                    artist: "jestR", file: "mp3Wheels-36.mp3" },
    { title: "Pop",                       artist: "jestR", file: "pop.mp3" },
    { title: "The Sum Of Hippy Thoughts", artist: "jestR", file: "the sum of hippy thoughts - Output - Stereo Out.mp3" },
    { title: "What Dreams May Come",      artist: "jestR", file: "what_dreams_may_comewavy.wav" },
  ];

  const audio = document.getElementById("audio-player");
  let currentIndex = 0, isPlaying = false, isShuffle = false;
  // repeatMode: 0 = off, 1 = repeat all, 2 = repeat one
  let repeatMode = 0;

  // ── pending seek: if user seeks before duration is known, store and apply on loadedmetadata
  let pendingSeekPct = null;

  function fmt(s) {
    if (!s || isNaN(s) || !isFinite(s)) return "0:00";
    return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,"0")}`;
  }
  function updateChroma(id, text) {
    const el = document.getElementById(id); if (!el) return;
    el.textContent = text; el.setAttribute("data-text", text);
  }
  function downloadCurrent() {
    const t = TRACKS[currentIndex];
    const a = document.createElement("a");
    a.href = encodeURIComponent(t.file); a.download = t.file; a.click();
  }

  // ── Apply pending seek once metadata is loaded
  audio.addEventListener("loadedmetadata", () => {
    if (pendingSeekPct !== null && isFinite(audio.duration) && audio.duration > 0) {
      audio.currentTime = pendingSeekPct * audio.duration;
      pendingSeekPct = null;
    }
  });

  function loadTrack(index, autoplay=false) {
    currentIndex = index;
    pendingSeekPct = null;
    const t = TRACKS[index];
    audio.src = encodeURIComponent(t.file);
    audio.load();
    updateChroma("focal-title", t.title);
    updateChroma("focal-title-mobile", t.title);
    ["focal-artist","focal-artist-mobile"].forEach(id => document.getElementById(id).textContent = t.artist);
    ["footer-title","mob-footer-title"].forEach(id => document.getElementById(id).textContent = t.title);
    ["footer-artist","mob-footer-artist"].forEach(id => document.getElementById(id).textContent = t.artist);
    setProgress(0);
    ["time-current","mob-time-current","time-total","mob-time-total"].forEach(id => document.getElementById(id).textContent="0:00");
    renderAll();
    if (autoplay) {
      audio.play().then(() => { isPlaying=true; updatePlayIcons(); renderAll(); }).catch(()=>{});
    } else {
      isPlaying=false;
    }
    updatePlayIcons();
  }

  function setProgress(pct) {
    document.getElementById("progress-fill").style.width = pct+"%";
    document.getElementById("mob-progress-fill").style.width = pct+"%";
    document.getElementById("progress-thumb").style.left = pct+"%";
    document.getElementById("mob-progress-thumb").style.left = pct+"%";
  }

  // ── SEEK — works even if metadata not yet loaded
  function seekToPct(pct) {
    pct = Math.max(0, Math.min(1, pct));
    if (audio.readyState >= 1 && isFinite(audio.duration) && audio.duration > 0) {
      audio.currentTime = pct * audio.duration;
      pendingSeekPct = null;
    } else {
      // store and apply once metadata arrives
      pendingSeekPct = pct;
    }
    // update UI immediately so it feels responsive
    setProgress(pct * 100);
  }

  function seekFromEvent(e, rail) {
    const r = rail.getBoundingClientRect();
    seekToPct((e.clientX - r.left) / r.width);
  }

  function makeScrubber(railId) {
    const rail = document.getElementById(railId);
    let dragging = false;
    rail.addEventListener("mousedown", e => {
      dragging = true; rail.classList.add("dragging");
      seekFromEvent(e, rail); e.preventDefault();
    });
    window.addEventListener("mousemove", e => { if (dragging) seekFromEvent(e, rail); });
    window.addEventListener("mouseup", () => { if (dragging) { dragging=false; rail.classList.remove("dragging"); } });
    rail.addEventListener("touchstart", e => {
      dragging=true; rail.classList.add("dragging");
      seekFromEvent(e.touches[0], rail); e.preventDefault();
    }, {passive:false});
    window.addEventListener("touchmove", e => { if (dragging) seekFromEvent(e.touches[0], rail); }, {passive:true});
    window.addEventListener("touchend", () => { dragging=false; rail.classList.remove("dragging"); });
  }
  makeScrubber("progress-rail");
  makeScrubber("mob-progress-rail");

  // ── SKIP ±10s
  function skip(sec) {
    if (audio.readyState >= 1) {
      audio.currentTime = Math.max(0, Math.min(audio.duration||0, (audio.currentTime||0) + sec));
    }
  }

  // ── REPEAT MODE (0=off, 1=all, 2=one)
  function updateRepeatUI() {
    const btn = document.getElementById("btn-repeat");
    const icon = document.getElementById("repeat-icon");
    if (repeatMode === 0) {
      btn.style.color = "#6e6875";
      icon.textContent = "repeat";
      btn.title = "Repeat: Off";
    } else if (repeatMode === 1) {
      btn.style.color = "var(--jestr-blue)";
      icon.textContent = "repeat";
      btn.title = "Repeat: All";
    } else {
      btn.style.color = "var(--jestr-red)";
      icon.textContent = "repeat_one";
      btn.title = "Repeat: One";
    }
  }

  function updatePlayIcons() {
    const icon = isPlaying ? "pause" : "play_arrow";
    document.getElementById("play-icon").textContent = icon;
    document.getElementById("mob-play-icon").textContent = icon;
  }

  function trackHTML(t, i, isActive) {
    return `<div class="track-item" data-index="${i}"
      style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;cursor:pointer;
        border:1px solid ${isActive?'rgba(123,47,255,0.3)':'transparent'};
        background:${isActive?'rgba(45,91,255,0.1)':'transparent'};
        transition:background 0.15s,border-color 0.15s">
      <span style="font-size:9px;font-weight:700;color:#6e6875;width:16px;flex-shrink:0;text-align:right">${String(i+1).padStart(2,"0")}</span>
      <div style="flex:1;min-width:0">
        <p class="track-title" style="font-size:11px;font-weight:700;color:${isActive?'#e9e1de':'rgba(233,225,222,0.45)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0">${t.title}</p>
        <p class="track-artist" style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:${isActive?'var(--jestr-green)':'rgba(110,104,117,0.45)'};margin:0">${t.artist}</p>
      </div>
      ${isActive&&isPlaying?'<span class="material-symbols-outlined" style="font-size:12px;color:var(--jestr-purple);flex-shrink:0">equalizer</span>':''}
    </div>`;
  }

  function renderAll() {
    const html = TRACKS.map((t,i) => trackHTML(t,i,i===currentIndex)).join("");
    ["sidebar-tracklist","mobile-tracklist","mobile-main-tracklist"].forEach(id => {
      const el = document.getElementById(id); if (!el) return;
      el.innerHTML = html;
      el.querySelectorAll(".track-item").forEach(item => {
        item.addEventListener("mouseenter", () => { if (parseInt(item.dataset.index)!==currentIndex) item.style.background="rgba(45,91,255,0.06)"; });
        item.addEventListener("mouseleave", () => { if (parseInt(item.dataset.index)!==currentIndex) item.style.background=""; });
        item.addEventListener("click", () => { loadTrack(parseInt(item.dataset.index),true); closeDrawer(); });
      });
    });
    const upnext = document.getElementById("upnext-list");
    if (upnext) {
      upnext.innerHTML = [1,2,3].map(i => {
        const idx = (currentIndex+i)%TRACKS.length; const t = TRACKS[idx];
        return `<div data-index="${idx}" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid rgba(45,91,255,0.08);transition:background 0.15s"
          onmouseenter="this.style.background='rgba(45,91,255,0.07)'" onmouseleave="this.style.background=''">
          <span style="font-size:9px;font-weight:700;color:#6e6875;flex-shrink:0">${String(i).padStart(2,"0")}</span>
          <div style="flex:1;min-width:0">
            <p style="font-size:11px;font-weight:700;color:rgba(233,225,222,0.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0">${t.title.toUpperCase()}</p>
            <p style="font-size:8px;font-weight:700;color:rgba(0,200,150,0.4);letter-spacing:0.14em;margin:0">${t.artist.toUpperCase()}</p>
          </div>
        </div>`;
      }).join("");
      upnext.querySelectorAll("[data-index]").forEach(el => {
        el.addEventListener("click", () => loadTrack(parseInt(el.dataset.index),true));
      });
    }
  }

  // ── VOLUME
  function setVolume(pct) {
    audio.volume = pct;
    document.getElementById("volume-fill").style.width = (pct*100)+"%";
    document.getElementById("volume-thumb").style.left = (pct*100)+"%";
  }
  (function(){
    const rail = document.getElementById("volume-rail"); let dragging=false;
    function volFromEvent(e){const r=rail.getBoundingClientRect();setVolume(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)));}
    rail.addEventListener("mousedown",e=>{dragging=true;volFromEvent(e);e.preventDefault();});
    window.addEventListener("mousemove",e=>{if(dragging)volFromEvent(e);});
    window.addEventListener("mouseup",()=>{dragging=false;});
  })();

  // ── TIMEUPDATE
  audio.addEventListener("timeupdate", () => {
    if (!audio.duration||!isFinite(audio.duration)) return;
    const pct = (audio.currentTime/audio.duration)*100;
    setProgress(pct);
    const cur=fmt(audio.currentTime), tot=fmt(audio.duration);
    ["time-current","mob-time-current"].forEach(id=>document.getElementById(id).textContent=cur);
    ["time-total","mob-time-total"].forEach(id=>document.getElementById(id).textContent=tot);
  });

  // ── ENDED
  audio.addEventListener("ended", () => {
    if (repeatMode === 2) { audio.currentTime=0; audio.play(); return; }
    if (repeatMode === 1) { loadTrack((currentIndex+1)%TRACKS.length, true); return; }
    // repeat off: advance but stop at last track
    if (currentIndex < TRACKS.length - 1) {
      loadTrack(isShuffle ? Math.floor(Math.random()*TRACKS.length) : currentIndex+1, true);
    } else {
      isPlaying=false; updatePlayIcons(); renderAll();
    }
  });

  // ── CONTROLS
  function togglePlay(){
    if(!audio.src||audio.src===window.location.href){loadTrack(0,true);return;}
    if(isPlaying){audio.pause();isPlaying=false;}else{audio.play();isPlaying=true;}
    updatePlayIcons();renderAll();
  }
  function prevTrack(){if((audio.currentTime||0)>3){audio.currentTime=0;return;}loadTrack((currentIndex-1+TRACKS.length)%TRACKS.length,isPlaying);}
  function nextTrack(){loadTrack(isShuffle?Math.floor(Math.random()*TRACKS.length):(currentIndex+1)%TRACKS.length,isPlaying);}

  document.getElementById("btn-play").addEventListener("click",togglePlay);
  document.getElementById("btn-prev").addEventListener("click",prevTrack);
  document.getElementById("btn-next").addEventListener("click",nextTrack);
  document.getElementById("btn-back10").addEventListener("click",()=>skip(-10));
  document.getElementById("btn-fwd10").addEventListener("click",()=>skip(10));
  document.getElementById("btn-download").addEventListener("click",downloadCurrent);
  document.getElementById("mob-btn-play").addEventListener("click",togglePlay);
  document.getElementById("mob-btn-prev").addEventListener("click",prevTrack);
  document.getElementById("mob-btn-next").addEventListener("click",nextTrack);
  document.getElementById("mob-btn-back10").addEventListener("click",()=>skip(-10));
  document.getElementById("mob-btn-fwd10").addEventListener("click",()=>skip(10));
  document.getElementById("mob-btn-download").addEventListener("click",downloadCurrent);

  document.getElementById("btn-shuffle").addEventListener("click",()=>{
    isShuffle=!isShuffle;
    document.getElementById("btn-shuffle").style.color=isShuffle?"var(--jestr-blue)":"#6e6875";
  });
  document.getElementById("btn-repeat").addEventListener("click",()=>{
    repeatMode=(repeatMode+1)%3;
    updateRepeatUI();
  });

  // ── SEARCH
  document.getElementById("search-input").addEventListener("input",e=>{
    const q=e.target.value.toLowerCase();
    document.querySelectorAll(".track-item").forEach(el=>{
      const t=TRACKS[parseInt(el.dataset.index)];
      el.style.display=(t.title.toLowerCase().includes(q)||t.artist.toLowerCase().includes(q))?"":"none";
    });
  });

  // ── DRAWER
  document.getElementById("open-drawer").addEventListener("click",()=>{
    document.getElementById("mobile-drawer").classList.add("open");
    document.getElementById("drawer-overlay").classList.add("open");
  });
  document.getElementById("close-drawer").addEventListener("click",closeDrawer);
  document.getElementById("drawer-overlay").addEventListener("click",closeDrawer);
  function closeDrawer(){
    document.getElementById("mobile-drawer").classList.remove("open");
    document.getElementById("drawer-overlay").classList.remove("open");
  }

  setVolume(0.8);
  updateRepeatUI();
  loadTrack(0,false);
</script>
</body>
</html>
